<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<!-- Marks that JS is available, before first paint, so the collapsible mobile
     nav only engages when it can actually be toggled (no-JS = nav stays open). -->
<script>document.documentElement.classList.add('js');</script>
<title>{{ if .IsHome }}{{ .Site.Title }} &mdash; automated game-hopping proofs{{ else }}{{ .Title }} &mdash; {{ .Site.Title }}{{ end }}</title>
{{ with .Description }}<meta name="description" content="{{ . }}">{{ end }}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ "styles.css" | relURL }}">
{{ hugo.Generator }}
