<header class="site-header">
  <div class="container header-inner">
    <a href="{{ "/" | relURL }}" class="wordmark">
      <span class="mark"></span>
      {{ .Site.Title }}
    </a>
    <button class="nav-toggle" type="button" aria-label="Toggle menu"
            aria-controls="site-nav" aria-expanded="false">
      <span class="nav-toggle-bars"></span>
    </button>
    <nav id="site-nav" class="nav-links">
      {{ range .Site.Menus.main }}
      <a href="{{ .URL }}">{{ .Name }}</a>
      {{ end }}
    </nav>
  </div>
</header>
